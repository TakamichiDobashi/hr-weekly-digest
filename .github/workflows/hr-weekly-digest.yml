name: HR Weekly Digest

on:
  schedule:
    # 毎週月曜日 8:00 JST（= 日曜 23:00 UTC）
    - cron: '0 23 * * 0'
  # GitHubのActionsタブから手動実行も可能
  workflow_dispatch:

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install \
            anthropic \
            notion-client

      - name: 週次ダイジェストを生成・投稿
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: python scripts/hr_weekly_digest.py
